<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/1041/1041924.png">
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/1041/1041924.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>易能量 Pro</title> 
    <meta name="apple-mobile-web-app-title" content="易能量"> 
    <meta name="application-name" content="易能量"> 
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <script src="https://cdn.jsdelivr.net/npm/lunar-javascript/lunar.js"></script>
    
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; \n            background-color: #121212; 
            color: #ffffff; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 15px; 
            margin: 0; 
            padding-bottom: 80px; 
        }
    </style>
</head>
<body>

<div id="ten-god-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 9999; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box;">
    <div style="background: #1e1e1e; border: 1px solid #ffca28; border-radius: 12px; width: 100%; max-width: 430px; padding: 22px; box-sizing: border-box; position: relative; color: #fff; box-shadow: 0 4px 25px rgba(0,0,0,0.6);">
        <h3 id="tg-modal-title" style="margin-top: 0; color: #ffca28; border-bottom: 1px solid #333; padding-bottom: 12px; font-size: 1.15rem; letter-spacing: 1px;">十神運勢解讀</h3>
        <p id="tg-modal-desc" style="font-size: 0.95rem; line-height: 1.6; color: #e0e0e0; margin-bottom: 22px; letter-spacing: 0.5px;"></p>
        <button onclick="closeTenGodModal()" style="width: 100%; background: #ffca28; color: #121212; border: none; padding: 12px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 1rem; transition: background 0.2s;">我知道了</button>
    </div>
</div>

<script>
// 🔮 十神當日引力與商務防禦白話辭典
const TEN_GODS_DICT = {
    "印星運": {
        title: "正印/偏印運：能量吸收與直覺內耗期",
        desc: "<b>【今日心理狀態】</b> 磁場處於充電與吸收狀態。大腦像海綿一樣，非常適合沉澱、看書、學習或進行深度思考。<br><br><b>【商務與社交防禦】</b> 今日行動力稍微放緩，內心防禦機制較強，容易想得太多、流於內耗，或者顯得有點孤僻。在商務談判上，今天適合當個『傾聽與觀察者』，不宜盲目衝動做決定。"
    },
    "官殺運": {
        title: "正官/七殺運：自律約束與高壓聚焦期",
        desc: "<b>【今日心理狀態】</b> 磁場迎來強烈的責任感與外部壓力。當天會明顯感覺到事情排山倒海而來，或是受到主管、環境、法規的嚴格檢視。<br><br><b>【商務與社交防禦】</b> 今日自律指數爆表，執行力強。但要注意容易因為防禦心過強，導致與人溝通時顯得嚴肅、死板。面對客戶時請多點微笑，避免把當天的『高壓氣候』變成對別人的殺氣。"
    },
    "食傷運": {
        title: "食神/傷官運：創意爆發與表達慾期",
        desc: "<b>【今日心理狀態】</b> 靈感與創意如泉湧的一天！腦袋轉得極快，表達慾望強烈，不甘於墨守成規，很想打破現狀。<br><br><b>【商務與社交防禦】</b> 適合進行頭腦風暴、產品研發或行銷提案。但防禦側要注意『言多必失』，口才太好容易顯得咄咄逼人或是不夠沉穩，當天與人相處要稍微收斂一點鋒芒。"
    },
    "財星運": {
        title: "正財/偏財運：商務執行與財富流動期",
        desc: "<b>【今日心理狀態】</b> 目標導向非常明確的一天！當天對數字、利潤、實質結果的敏銳度極高，做事的控制慾 and 務實感大幅提升。<br><br><b>【商務與社交防禦】</b> 這是推進專案、簽約、檢視財務報表的最佳流日。社交上會很注重『這件事有沒有效益』。注意不要因為太追求效率，而忽略了合作夥伴的情緒感受。"
    },
    "比劫運": {
        title: "比肩/劫財運：自我核心與同儕連結期",
        desc: "<b>【今日心理狀態】</b> 自我意識高度抬頭，意志力堅定，不容易被別人的意見動搖。同時也會有較多與同儕、朋友、同事平級互動的機會。<br><br><b>【商務與社交防禦】</b> 適合團隊作戰、拓展人脈。但因為主觀意識強、防禦心轉為『自我保護』，容易在合作中跟人硬剛、互不相讓，記得當天多聽聽別人的意見，避免流於固執。"
    }
};

function detectTenGodKey(text) {
    if (!text) return "印星運";
    for (let key in TEN_GODS_DICT) {
        if (text.includes(key.substring(0, 2))) return key; // 模糊比對「印星」、「官殺」
    }
    return "印星運"; // 預設防呆
}

function openTenGodModal(key) {
    const data = TEN_GODS_DICT[key];
    if (!data) return;
    document.getElementById('tg-modal-title').innerHTML = data.title;
    document.getElementById('tg-modal-desc').innerHTML = data.desc;
    document.getElementById('ten-god-modal').style.display = 'flex';
}

function closeTenGodModal() {
    document.getElementById('ten-god-modal').style.display = 'none';
}

// 點擊彈窗外部關閉
window.addEventListener('click', function(e) {
    const modal = document.getElementById('ten-god-modal');
    if (e.target === modal) {
        modal.style.display = 'none';
    }
});

// 🌟 精密降噪兼具點擊跳窗的「他人分析引擎」核心
function analyzeBazi() {
    const aDate = document.getElementById('analyze-date').value;
    const aTime = document.getElementById('analyze-time').value;
    const aGender = document.getElementById('analyze-gender').value;
    const isUnknown = document.getElementById('analyze-unknown').checked;
    
    if (!aDate) return alert("請選擇對方的生日日期！");
    
    const mDate = localStorage.getItem('my_date');
    let myBazi = null;
    if (mDate) {
        const myLunar = getLunarObj(mDate, localStorage.getItem('my_time') || '12:00', localStorage.getItem('my_unknown') === 'true');
        myBazi = getBaziArray(myLunar, localStorage.getItem('my_unknown') === 'true');
    }
    
    localStorage.setItem('last_analyze_date', aDate);
    localStorage.setItem('last_analyze_time', aTime);
    localStorage.setItem('last_analyze_gender', aGender);
    localStorage.setItem('last_analyze_unknown', isUnknown);
    
    const targetLunar = getLunarObj(aDate, aTime, isUnknown);
    const targetBazi = getBaziArray(targetLunar, isUnknown);
    const targetDayGan = targetBazi.stems[2];
    const genderTerm = aGender === '1' ? '乾造' : '坤造';
    
    // 取得對方今日的能量預測數據
    const prediction = getEnergyPrediction(targetBazi.stems, 'daily', targetBazi);
    
    // 🔍 核心捕捉：分析今日十神究竟屬於哪一個字典檔
    const detectedKey = detectTenGodKey(prediction.vibeLabel + prediction.text);
    
    document.getElementById('analyze-result').style.display = 'block';
    
    // 改造渲染格式：包裝成精美的點擊膠囊按鈕
    document.getElementById('analyze-bazi').innerHTML = `
        [${genderTerm}] ${targetBazi.formatStr} <br>
        <div onclick="openTenGodModal('${detectedKey}')" style="display:inline-block; margin-top:10px; background: rgba(255, 202, 40, 0.12); border: 1px solid #ffca28; color: #ffca28; padding: 5px 12px; border-radius: 20px; font-size: 0.82rem; cursor: pointer; transition: all 0.2s; font-weight: 500; letter-spacing: 0.5px;">
            🔍 日主 ${targetDayGan} | ${detectedKey} (點擊解讀今日磁場)
        </div>
    `;
    
    const energyCard = document.getElementById('analyze-energy-card');
    energyCard.style.display = 'block';
    energyCard.style.background = prediction.color || prediction.cardColor;
    
    document.getElementById('analyze-description').innerHTML = `<b style="color: #fff;">今日核心感應 (${formatTextKeywords(prediction.vibeLabel)})</b>`;
    document.getElementById('analyze-energy-text').innerHTML = formatTextKeywords(prediction.text);
    document.getElementById('analyze-energy-action').innerHTML = formatTextKeywords(prediction.action);

    // --- 避雷與合作星級演算板塊 (精密降噪版) ---
    const guideCard = document.getElementById('analyze-guide-card');
    const starsDisplay = document.getElementById('analyze-stars-display');
    const guideText = document.getElementById('analyze-guide-text');
    
    guideCard.style.display = 'block';
    
    let rawScore = prediction.fortuneScore || 60; 
    let isPositive = true;
    
    const hasCoreClash = (prediction.text.includes('【月支】') || prediction.text.includes('【日支】')) && 
                         (prediction.text.includes('相衝') || prediction.text.includes('相刑'));
    
    if (rawScore < 46 || hasCoreClash) {
        isPositive = false;
    }

    let computedStars = 3;
    if (isPositive) {
        if (rawScore >= 82) computedStars = 5;
        else if (rawScore >= 65) computedStars = 4;
        else if (rawScore >= 48) computedStars = 3;
        else computedStars = 2;
    } else {
        if (rawScore <= 40 || (hasCoreClash && rawScore < 50)) computedStars = 5; 
        else if (rawScore < 46) computedStars = 4;
        else computedStars = 3; 
    }

    let starsHtml = "";
    let guideMessage = "";

    if (isPositive) {
        starsHtml = `<span style="color: #ffca28;">` + "🌟".repeat(computedStars) + "⭐".repeat(5 - computedStars) + `</span>`;
        
        if (computedStars >= 4) {
            guideMessage = `🔥 <b>高頻合作期（極力推薦）</b>：對方今日整體磁場順暢，心態開放！非常適合與其進行<b>重要會議、商業談判、合夥簽約或重大提案</b>。此時相處阻力最小，共識極易達成。`;
        } else {
            guideMessage = `😊 <b>和諧相處期（穩步推進）</b>：對方今日狀態平穩。適合正常的業務溝通、工作交接或日常聚餐。雖然可能有些外圍環境的小雜事干擾（如年支/時支輕微波動），但大局無礙，可以放心推進既定事務。`;
        }
        
        if (myBazi) {
            const myDayGan = myBazi.stems[2];
            const relationMeToTarget = RELATION_MAP[ELEMENT_MAP[myDayGan]][ELEMENT_MAP[targetDayGan]];
            if (relationMeToTarget === '財星') {
                guideMessage += `<br>💡 <b>加碼提示：</b>此人今日磁場與您相生且為您的【財星】，探討商務方向容易碰撞出具體變現的靈感！`;
            }
        }
        
        guideCard.style.background = "rgba(46, 125, 50, 0.15)"; 
        guideCard.style.borderColor = "#2e7d32";
    } else {
        starsHtml = `<span style="color: #757575;">` + "⚫".repeat(computedStars) + "⚪".repeat(5 - computedStars) + `</span>`;
        
        guideMessage = `⚠️ <b>高能雷區預警（建議避雷）</b>：對方今日核心磁場（月支/日支）遭遇明顯衝刑摩擦，或整體能量陷入低迷、內耗狀態，容易產生焦躁、防禦心重或壓力爆棚的情況。<br><br>`;
        guideMessage += `❌ <b>避雷指引：</b>今日談話請多點包容、保持安全距離。<b>強烈建議暫緩重大談判、不要在此時逼迫其做重要決定</b>，避免正面硬剛，以免踩到隱形地雷導致相處僵持！`;
        
        guideCard.style.background = "rgba(198, 40, 40, 0.15)"; 
        guideCard.style.borderColor = "#c62828";
    }

    starsDisplay.innerHTML = starsHtml + `<br><span style="font-size:0.85rem; color:#aaa;">(今日磁場引力綜合判定)</span>`;
    guideText.innerHTML = guideMessage;
}

document.addEventListener("DOMContentLoaded", () => {
    initHome(); 
    if (localStorage.getItem('last_analyze_date')) {
        document.getElementById('analyze-date').value = localStorage.getItem('last_analyze_date');
        document.getElementById('analyze-time').value = localStorage.getItem('last_analyze_time') || '12:00';
        document.getElementById('analyze-gender').value = localStorage.getItem('last_analyze_gender') || '1';
        document.getElementById('analyze-unknown').checked = localStorage.getItem('last_analyze_unknown') === 'true';
        toggleTime('analyze'); 
    }
});

function showHome() {
    initHome();
    switchPage('home', document.querySelector('.nav-item[onclick*="\'home\'"]')); 
}
</script>
</body>
</html>
