<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/1041/1041924.png">
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/1041/1041924.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>今日能量預報</title>
    <script src="https://cdn.jsdelivr.net/npm/lunar-javascript/lunar.js"></script>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="能量預報">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212; color: #ffffff;
            display: flex; flex-direction: column; align-items: center; padding: 20px;
        }
        .container {
            background: #1e1e1e; padding: 30px; border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 100%; max-width: 400px;
            margin-bottom: 20px;
        }
        h1 { font-size: 1.5rem; margin-bottom: 5px; color: #aaaaaa; text-align: center;}
        .date { font-size: 1.2rem; font-weight: bold; margin-bottom: 5px; text-align: center;}
        .bazi { font-size: 1rem; color: #ffb300; margin-bottom: 20px; text-align: center;}
        
        .spectrum-display {
            width: 100%; height: 120px; border-radius: 15px; display: flex;
            align-items: center; justify-content: center; font-size: 1.8rem; font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5); margin-bottom: 20px;
        }
        .desc { font-size: 0.95rem; color: #cccccc; margin-bottom: 20px; line-height: 1.5; min-height: 60px; text-align: center;}
        
        /* 按鈕區 */
        .btn-group { display: flex; justify-content: space-between; gap: 8px; margin-bottom: 10px; }
        button { flex: 1; padding: 12px 5px; border: none; border-radius: 10px; font-size: 0.9rem; font-weight: bold; cursor: pointer;}
        button:active { transform: scale(0.95); }
        .btn-accurate { background-color: #4caf50; color: white; }
        .btn-inaccurate { background-color: #757575; color: white; }
        .btn-jackpot { background-color: #ffb300; color: black; }

        /* 歷史紀錄區 */
        .history-section { width: 100%; max-width: 400px; background: #1e1e1e; border-radius: 15px; padding: 15px; box-sizing: border-box;}
        h2 { font-size: 1.1rem; border-bottom: 1px solid #333; padding-bottom: 10px; margin-top: 0; color: #888; }
        #history-list { list-style: none; padding: 0; margin: 0; max-height: 200px; overflow-y: auto; }
        .history-item { 
            font-size: 0.85rem; padding: 8px 0; border-bottom: 1px solid #2a2a2a;
            display: flex; justify-content: space-between;
        }
        .tag { padding: 2px 6px; border-radius: 4px; font-size: 0.75rem; margin-left: 5px;}
    </style>
</head>
<body>

<div class="container">
    <h1>今日系統能量</h1>
    <div class="date" id="today-date">--</div>
    <div class="bazi" id="today-bazi">--</div>
    <div class="spectrum-display" id="spectrum">偵測中...</div>
    <div class="desc" id="description">--</div>

    <div class="btn-group">
        <button class="btn-accurate" onclick="saveRecord('準！')">📈 準！</button>
        <button class="btn-inaccurate" onclick="saveRecord('沒感覺')">📉 沒感覺</button>
        <button class="btn-jackpot" onclick="saveRecord('噴寶')">💎 噴寶</button>
    </div>
</div>

<div class="history-section">
    <h2>研究日誌 (最近紀錄)</h2>
    <ul id="history-list">
        </ul>
    <button style="width:100%; background:none; color:#555; font-size:0.7rem; margin-top:10px;" onclick="clearHistory()">清除所有紀錄</button>
</div>

<script>
    let currentData = {};

    function init() {
        const today = new Date();
        const lunar = Lunar.fromDate(today);
        const gzDay = lunar.getDayInGanZhi();
        const dayZhi = lunar.getDayZhi();

        currentData = {
            date: `${today.getFullYear()}/${today.getMonth()+1}/${today.getDate()}`,
            bazi: `${lunar.getYearInGanZhi()}年 ${lunar.getMonthInGanZhi()}月 ${gzDay}日`,
            zhi: dayZhi
        };

        document.getElementById('today-date').innerText = currentData.date;
        document.getElementById('today-bazi').innerText = currentData.bazi;
        
        updateUI(gzDay, dayZhi);
        loadHistory();
    }

    function updateUI(gzDay, zhi) {
    const spectrum = document.getElementById('spectrum');
    const desc = document.getElementById('description');
    
    // 取得今日天干 (日干)
    const gan = gzDay.substring(0, 1);
    
    // 定義戊土人的十神與能量色彩
    const baziLogic = {
        '甲': { name: '七殺', type: '壓力/突破', color: 'linear-gradient(135deg, #455a64, #263238)', text: '今日壓力較大，適合處理硬骨頭任務，注意自律。' },
        '乙': { name: '正官', type: '自律/名望', color: 'linear-gradient(135deg, #5c6bc0, #303f9f)', text: '官星入命，做事條理分明，適合與主管或官方打交道。' },
        '丙': { name: '偏印', type: '領悟/奇想', color: 'linear-gradient(135deg, #ff7043, #d84315)', text: '偏印暖局，靈感爆棚！適合鑽研 AI 或玄學專案。' },
        '丁': { name: '正印', type: '守護/穩定', color: 'linear-gradient(135deg, #fb8c00, #e65100)', text: '正印生身，貴人運佳，心境平和，適合學習與輸入。' },
        '戊': { name: '比肩', type: '同輩/自我', color: 'linear-gradient(135deg, #8d6e63, #4e342e)', text: '能量持平，適合與朋友交流，但要注意不必要的支出。' },
        '己': { name: '劫財', type: '競爭/消耗', color: 'linear-gradient(135deg, #795548, #3e2723)', text: '劫財出現，容易有社交開銷，建議保持低調避免衝動。' },
        '庚': { name: '食神', type: '才華/享樂', color: 'linear-gradient(135deg, #26a69a, #00695c)', text: '食神洩秀，才華洋溢！非常適合寫 Code 或構思新 App。' },
        '辛': { name: '傷官', type: '開拓/變革', color: 'linear-gradient(135deg, #00acc1, #006064)', text: '傷官主事，點子極多但容易鋒芒太露，說話留三分。' },
        '壬': { name: '偏財', type: '驚喜/噴寶', color: 'linear-gradient(135deg, #fdd835, #f57f17)', text: '偏財透出！今日對金錢嗅覺靈敏，大膽執行財務規劃。' },
        '癸': { name: '正財', type: '穩健/收成', color: 'linear-gradient(135deg, #fbc02d, #f9a825)', text: '正財敲門，努力必有回報，適合處理帳務或簽約。' }
    };

    const energy = baziLogic[gan] || { name: '未知', color: '#333', text: '偵測中...' };

    // 更新 UI
    spectrum.style.background = energy.color;
    spectrum.innerText = `${energy.name}：${energy.type}`;
    
    // 結合地支增加環境描述
    let extraDesc = "";
    if(['寅','申','巳','亥'].includes(zhi)) extraDesc = " (動能較強，宜主動出擊)";
    if(['辰','戌','丑','未'].includes(zhi)) extraDesc = " (能量穩定，宜固本培元)";
    
    desc.innerText = `${energy.text}${extraDesc}`;
    currentData.color = energy.name; // 儲存到歷史紀錄中
}

    // --- 數據儲存邏輯 ---
    // --- V1.3 雲端同步儲存邏輯 ---
    // ⚠️ 請把下面這串網址，換成你剛剛在 Apps Script 複製的 URL！
    const GOOGLE_SHEET_URL = 'https://script.google.com/macros/s/AKfycbxM2jXk0wbZrQZWfcgLzK_LIjuR-szF1xw9EBU2qAyPfXTBCUFS4Am4muTGGX6yDs2q/exec';

    function saveRecord(feedback) {
        // 1. 本地儲存 (保持原本的 UI 更新功能)
        let history = JSON.parse(localStorage.getItem('singularity_history') || '[]');
        if(history.length > 0 && history[0].date === currentData.date) {
            if(!confirm("今天已經記錄過了，要覆蓋並重新傳送雲端嗎？")) return;
            history.shift(); 
        }
        const newRecord = { date: currentData.date, bazi: currentData.bazi, color: currentData.color, feedback: feedback };
        history.unshift(newRecord);
        localStorage.setItem('singularity_history', JSON.stringify(history.slice(0, 50)));
        loadHistory();

        // 2. 發射數據到 Google Sheets 雲端
        const originalBtnText = event.target.innerText;
        event.target.innerText = "☁️ 同步中...";
        
        fetch(GOOGLE_SHEET_URL, {
            method: 'POST',
            mode: 'no-cors', 
            body: JSON.stringify(newRecord)
        })
        .then(() => {
            // 由於 mode: 'no-cors'，瀏覽器會直接進入這裡，不論 Google 回傳什麼
            // 我們直接給予成功體感
            console.log("數據已發射，預設同步成功");
            alert(`✅ 特異點日誌已記錄！\n今日體感：${feedback}`);
            event.target.innerText = originalBtnText;
        })
        .finally(() => {
            // 萬一真的卡住，至少按鈕文字會換回來
            event.target.innerText = originalBtnText;
        });
    }

    function loadHistory() {
        const history = JSON.parse(localStorage.getItem('singularity_history') || '[]');
        const list = document.getElementById('history-list');
        list.innerHTML = history.map(item => `
            <li class="history-item">
                <span>${item.date} (${item.bazi.split(' ')[2]})</span>
                <span>
                    <span class="tag" style="border: 1px solid #555">${item.color}</span>
                    <span class="tag" style="background: #333; color: #ffb300">${item.feedback}</span>
                </span>
            </li>
        `).join('');
    }

    function clearHistory() {
        if(confirm("確定要刪除所有研究數據嗎？這無法復原喔！")) {
            localStorage.removeItem('singularity_history');
            loadHistory();
        }
    }

    window.onload = init;
</script>

</body>
</html>
