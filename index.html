<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/1041/1041924.png">
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/1041/1041924.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>今日能量預報</title>
    <script src="https://cdn.jsdelivr.net/npm/lunar-javascript/lunar.js"></script>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="能量預報">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212; color: #ffffff;
            display: flex; flex-direction: column; align-items: center; padding: 20px;
        }
        .container {
            background: #1e1e1e; padding: 30px; border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 100%; max-width: 400px;
            margin-bottom: 20px;
        }
        h1 { font-size: 1.5rem; margin-bottom: 5px; color: #aaaaaa; text-align: center;}
        .date { font-size: 1.2rem; font-weight: bold; margin-bottom: 5px; text-align: center;}
        .bazi { font-size: 1rem; color: #ffb300; margin-bottom: 20px; text-align: center;}
        
        .spectrum-display {
            width: 100%; height: 120px; border-radius: 15px; display: flex;
            align-items: center; justify-content: center; font-size: 1.8rem; font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5); margin-bottom: 20px; text-align: center;
            padding: 10px; box-sizing: border-box;
        }
        .desc { font-size: 0.95rem; color: #cccccc; margin-bottom: 20px; line-height: 1.5; min-height: 60px; text-align: center;}
        
        @keyframes pulse-gold {
            0% { box-shadow: 0 0 0 0 rgba(255, 179, 0, 0.7); transform: scale(1); }
            70% { box-shadow: 0 0 0 15px rgba(255, 179, 0, 0); transform: scale(1.05); }
            100% { box-shadow: 0 0 0 0 rgba(255, 179, 0, 0); transform: scale(1); }
        }

        .btn-group { display: flex; justify-content: space-between; gap: 8px; margin-bottom: 10px; }
        button { flex: 1; padding: 12px 5px; border: none; border-radius: 10px; font-size: 0.9rem; font-weight: bold; cursor: pointer; transition: 0.2s;}
        button:active { transform: scale(0.95); }
        .btn-accurate { background-color: #4caf50; color: white; }
        .btn-inaccurate { background-color: #757575; color: white; }
        .btn-jackpot { background-color: #ffb300; color: black; }

        .history-section { width: 100%; max-width: 400px; background: #1e1e1e; border-radius: 15px; padding: 15px; box-sizing: border-box;}
        h2 { font-size: 1.1rem; border-bottom: 1px solid #333; padding-bottom: 10px; margin-top: 0; color: #888; }
        #history-list { list-style: none; padding: 0; margin: 0; max-height: 250px; overflow-y: auto; }
        .history-item { 
            font-size: 0.8rem; padding: 10px; border-bottom: 1px solid #2a2a2a;
            background: #222; margin-bottom: 5px; border-radius: 8px;
        }
        .tag { padding: 2px 6px; border-radius: 4px; font-size: 0.7rem; margin-right: 5px; display: inline-block; margin-top: 5px;}
    </style>
</head>
<body>

<div class="container">
    <h1>今日系統能量</h1>
    
    <div id="user-config" style="background: #2a2a2a; padding: 15px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #444;">
        <p style="font-size: 0.8rem; margin: 0 0 10px 0; color: #aaa;">🌌 設定您的出生日期 (以求日主)</p>
        <input type="date" id="birth-date" style="width: 100%; padding: 10px; border-radius: 8px; border: none; background: #333; color: #fff; margin-bottom: 10px; box-sizing: border-box;">
        <button onclick="updateUserBazi()" style="width: 100%; background: #4caf50; color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer; font-weight: bold;">啟動個人能量引擎</button>
    </div>

    <div class="date" id="today-date">--</div>
    <div class="bazi" id="today-bazi">--</div>
    <div class="spectrum-display" id="spectrum">偵測中...</div>
    <div class="desc" id="description">--</div>

    <div class="btn-group">
        <button class="btn-accurate" onclick="logJackpot('準！', event)">📈 準！</button>
        <button class="btn-inaccurate" onclick="logJackpot('沒感覺', event)">📉 沒感覺</button>
        <button class="btn-jackpot" id="jackpot-main-btn" onclick="logJackpot('噴寶', event)">💎 噴寶</button>
    </div>
</div>

<div class="history-section">
    <h2>研究日誌 (最近紀錄)</h2>
    <ul id="history-list"></ul>
    <button style="width:100%; background:none; color:#555; font-size:0.7rem; margin-top:10px; border:none; cursor:pointer;" onclick="clearHistory()">清除所有紀錄</button>
</div>

<script>
// --- 1. 核心資料矩陣 ---
const ELEMENT_MAP = {
    '甲': '木', '乙': '木', '丙': '火', '丁': '火', '戊': '土', 
    '己': '土', '庚': '金', '辛': '金', '壬': '水', '癸': '水'
};

const ZHI_ELEMENT_MAP = {
    '寅': '木', '卯': '木', '巳': '火', '午': '火', '申': '金', 
    '酉': '金', '亥': '水', '子': '水', '辰': '土', '戌': '土', '丑': '土', '未': '土'
};

const RELATION_MAP = {
    '木': { '木': '比劫', '火': '食傷', '土': '財星', '金': '官殺', '水': '印星' },
    '火': { '木': '印星', '火': '比劫', '土': '食傷', '金': '財星', '水': '官殺' },
    '土': { '木': '官殺', '火': '印星', '土': '比劫', '金': '食傷', '水': '財星' },
    '金': { '木': '財星', '火': '官殺', '土': '印星', '金': '比劫', '水': '食傷' },
    '水': { '木': '食傷', '火': '財星', '土': '官殺', '金': '印星', '水': '比劫' }
};

// ⚠️ 請確保這是你正確的 Google Sheet API 網址
const GOOGLE_SHEET_URL = 'https://script.google.com/macros/s/AKfycbxM2jXk0wbZrQZWfcgLzK_LIjuR-szF1xw9EBU2qAyPfXTBCUFS4Am4muTGGX6yDs2q/exec';

let userDayGan = localStorage.getItem('user_day_gan') || '戊';
let currentData = { date: '', bazi: '', color: '', energyName: '' };

// --- 2. 系統初始化 ---
function init() {
    const today = new Date();
    const solar = Solar.fromYmd(today.getFullYear(), today.getMonth() + 1, today.getDate());
    const lunar = Lunar.fromSolar(solar);
    
    const gzDay = lunar.getDayInGanZhi(); 
    const dayZhi = lunar.getDayZhi();
    
    currentData.date = today.toLocaleString();
    currentData.bazi = `${lunar.getYearInGanZhi()}年 ${lunar.getMonthInGanZhi()}月 ${gzDay}日`;
    
    document.getElementById('today-date').innerText = today.toLocaleDateString();
    document.getElementById('today-bazi').innerText = `(流日：${gzDay})`;
    
    updateUI(gzDay, dayZhi);
    loadHistory();
}

// --- 3. 更新日主設定 ---
function updateUserBazi() {
    const birthDate = document.getElementById('birth-date').value;
    if (!birthDate) return alert("請選擇生日日期");

    const dateArr = birthDate.split('-');
    const lunar = Lunar.fromSolar(
        Solar.fromYmd(parseInt(dateArr[0]), parseInt(dateArr[1]), parseInt(dateArr[2]))
    );
    
    userDayGan = lunar.getDayGan();
    localStorage.setItem('user_day_gan', userDayGan); 
    
    alert(`引擎啟動！偵測到您的日主為：【${userDayGan} ${ELEMENT_MAP[userDayGan]}】`);
    init(); 
}

// --- 4. UI 渲染引擎 ---
function updateUI(gzDay, zhi) {
    const spectrum = document.getElementById('spectrum');
    const desc = document.getElementById('description');
    const jackpotBtn = document.getElementById('jackpot-main-btn');
    
    const todayGan = gzDay.substring(0, 1);
    const userElement = ELEMENT_MAP[userDayGan];
    const todayGanElement = ELEMENT_MAP[todayGan];
    const todayZhiElement = ZHI_ELEMENT_MAP[zhi];
    
    const relation = RELATION_MAP[userElement][todayGanElement];

    const themeMap = {
        '財星': { action: '噴寶', color: 'linear-gradient(135deg, #f1c40f, #f39c12)', text: '財氣透出！對金錢嗅覺靈敏，適合執行財務規劃。' },
        '官殺': { action: '突破', color: 'linear-gradient(135deg, #2c3e50, #1e3c72)', text: '官殺入命。壓力與名望並存，適合建立紀律或處理硬骨頭任務。' },
        '印星': { action: '吸收', color: 'linear-gradient(135deg, #d35400, #e67e22)', text: '印星護航。貴人運佳，適合學習與補充內在能量。' },
        '食傷': { action: '輸出', color: 'linear-gradient(135deg, #16a085, #2980b9)', text: '食傷洩秀。才華橫溢，點子極多，適合創作與寫 code。' },
        '比劫': { action: '自信', color: 'linear-gradient(135deg, #795548, #4e342e)', text: '比劫共振。能量充沛，適合交流合作，但需注意預算開支。' }
    };

    const energy = themeMap[relation];
    currentData.color = energy.color;
    currentData.energyName = `${relation}(${energy.action})`;

    // 動態 Vibe 偵測
    let vibeIcon = "⚓";
    let vibeText = "穩扎穩打";
    const myWealth = Object.keys(RELATION_MAP[userElement]).find(key => RELATION_MAP[userElement][key] === '財星');
    const myOfficer = Object.keys(RELATION_MAP[userElement]).find(key => RELATION_MAP[userElement][key] === '官殺');

    if (todayGanElement === myWealth || todayZhiElement === myWealth) {
        vibeIcon = "🌊"; vibeText = "財源滾滾";
        jackpotBtn.style.animation = "pulse-gold 1.5s infinite";
        jackpotBtn.innerText = "💎 財星入局！";
    } else {
        jackpotBtn.style.animation = "none";
        jackpotBtn.innerText = "💎 噴寶";
    }

    if (todayZhiElement === myOfficer) {
        vibeIcon = "🌲"; vibeText = "紀律與成長";
    } else if (['寅', '申', '巳', '亥'].includes(zhi) && vibeIcon !== "🌊") {
        vibeIcon = "⚡️"; vibeText = "動能全開";
    }

    spectrum.style.background = energy.color;
    spectrum.innerHTML = `<span style="font-size: 0.8rem; opacity: 0.7;">日主 ${userDayGan} | ${relation}</span><br>${energy.action}`;
    desc.innerHTML = `<b style="color: #fff;">${vibeIcon} ${vibeText}</b><br>${energy.text}`;
}

// --- 5. 點擊記錄與雲端同步 ---
function logJackpot(type, event) {
    let feedback = "";
    if (type === '噴寶') {
        feedback = prompt("✨ 紀錄此時的能量感應：", "財富直覺點滿 / 靈感爆發");
    } else {
        feedback = type;
    }
    
    if (!feedback) return;

    const newRecord = {
        date: new Date().toLocaleString(),
        bazi: currentData.bazi,
        color: currentData.energyName,
        feedback: feedback
    };

    // 儲存至本地
    let history = JSON.parse(localStorage.getItem('singularity_history') || '[]');
    history.unshift(newRecord);
    localStorage.setItem('singularity_history', JSON.stringify(history.slice(0, 50)));
    loadHistory();

    // 同步至 Google Sheets
    const btn = event.target;
    const originalBtnText = btn.innerText;
    
    if (GOOGLE_SHEET_URL) {
        btn.innerText = "☁️ 同步中...";
        fetch(GOOGLE_SHEET_URL, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify(newRecord)
        })
        .then(() => {
            console.log("數據已發射");
            alert(`✅ 紀錄成功！\n體感：${feedback}`);
        })
        .catch(err => console.error("同步失敗:", err))
        .finally(() => {
            btn.innerText = originalBtnText;
        });
    }
}

// --- 6. 歷史紀錄管理 ---
function loadHistory() {
    const history = JSON.parse(localStorage.getItem('singularity_history') || '[]');
    const list = document.getElementById('history-list');
    if(!list) return;

    list.innerHTML = history.map(item => `
        <li class="history-item">
            <div style="color: #888; font-size: 0.7rem;">${item.date}</div>
            <div style="margin-top: 3px;">
                <span class="tag" style="border: 1px solid #555">${item.color}</span>
                <span class="tag" style="background: #333; color: #ffb300">${item.feedback}</span>
            </div>
        </li>
    `).join('');
}

function clearHistory() {
    if(confirm("確定要刪除所有研究數據嗎？這無法復原喔！")) {
        localStorage.removeItem('singularity_history');
        loadHistory();
    }
}

// 啟動
window.onload = init;
</script>

</body>
</html>
