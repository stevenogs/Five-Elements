<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/1041/1041924.png">
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/1041/1041924.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>易能量</title> 
    <meta name="apple-mobile-web-app-title" content="易能量"> 
    <meta name="application-name" content="易能量"> 
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <script src="https://cdn.jsdelivr.net/npm/lunar-javascript/lunar.js"></script>
    
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212; color: #ffffff;
            display: flex; flex-direction: column; align-items: center; padding: 15px; margin: 0;
            padding-bottom: 80px; /* 留給底部導覽列的空間 */
        }
        .container {
            background: #1e1e1e; padding: 25px; border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 100%; max-width: 400px;
            margin-bottom: 20px; box-sizing: border-box;
        }
        h1 { font-size: 1.5rem; margin-top: 0; margin-bottom: 15px; color: #aaaaaa; text-align: center;}
        
        /* 頁面切換控制 */
        .page { display: none; width: 100%; max-width: 400px; animation: fadeIn 0.3s; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* 輸入框共用樣式 */
        .input-group { background: #2a2a2a; padding: 15px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #444; }
        .input-group p { font-size: 0.85rem; margin: 0 0 10px 0; color: #aaa; }
        .flex-row { display: flex; gap: 10px; margin-bottom: 10px; }
        input[type="date"], input[type="time"] { padding: 10px; border-radius: 8px; border: none; background: #333; color: #fff; box-sizing: border-box; }
        .btn-primary { width: 100%; background: #4caf50; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s;}
        .btn-primary:active { transform: scale(0.98); }
        .checkbox-container { display: flex; justify-content: flex-end; align-items: center; margin-bottom: 10px; font-size: 0.8rem; color: #aaa; cursor: pointer; }
        
        /* 能量條與圖表 */
        .spectrum-display { width: 100%; height: 120px; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; font-weight: bold; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); margin-bottom: 20px; flex-direction: column; }
        .desc { font-size: 0.95rem; color: #cccccc; margin-bottom: 20px; line-height: 1.5; min-height: 60px; text-align: center;}
        
        /* 底部導覽列 */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; width: 100%; background: #1a1a1a;
            display: flex; justify-content: space-around; padding: 10px 0;
            border-top: 1px solid #333; z-index: 100;
        }
        .nav-item {
            color: #888; text-align: center; font-size: 0.8rem; cursor: pointer;
            padding: 5px 15px; border-radius: 10px; transition: 0.3s;
        }
        .nav-item.active { color: #ffb300; font-weight: bold; background: rgba(255, 179, 0, 0.1); }
        .nav-icon { font-size: 1.2rem; display: block; margin-bottom: 3px; }

        /* 合盤結果樣式 */
        .match-score { font-size: 3rem; color: #ffb300; text-align: center; font-weight: bold; margin: 10px 0; text-shadow: 0 0 10px rgba(255, 179, 0, 0.5);}
        .match-card { background: #222; border: 1px solid #444; border-radius: 10px; padding: 15px; margin-bottom: 15px; }
        .match-title { font-size: 0.9rem; color: #aaa; border-bottom: 1px solid #444; padding-bottom: 5px; margin-bottom: 10px;}
        .bazi-compare-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; text-align: center; font-size: 0.9rem; margin-bottom: 10px;}
    </style>
</head>
<body>

<div id="page-home" class="page active">
    <div class="container">
        <h1>個人能量引擎</h1>
        
        <div class="input-group">
            <p>🌌 我的出生資訊</p>
            <div class="flex-row">
                <input type="date" id="my-date" style="flex: 2;">
                <input type="time" id="my-time" value="12:00" style="flex: 1;">
            </div>
            <label class="checkbox-container">
                <input type="checkbox" id="my-unknown" onchange="toggleTime('my')"> 不知道時辰
            </label>
            <button class="btn-primary" onclick="saveMyBazi()">設定我的命盤</button>
        </div>

        <div id="my-bazi-display" style="text-align: center; color: #ffb300; font-weight: bold; margin-bottom: 20px; display: none;"></div>

        <div style="font-size: 1.2rem; font-weight: bold; text-align: center; margin-bottom: 5px;" id="today-date">--</div>
        <div style="font-size: 1rem; color: #ffb300; text-align: center; margin-bottom: 15px;" id="today-bazi">--</div>
        
        <div class="spectrum-display" id="spectrum">未設定命盤</div>
        <div class="desc" id="description">請先輸入您的出生時間以啟動流日共振引擎。</div>
    </div>
</div>

<div id="page-match" class="page">
    <div class="container">
        <h1>人際合盤分析</h1>
        
        <div class="input-group">
            <p>🎯 對方的出生資訊</p>
            <div class="flex-row">
                <input type="date" id="target-date" style="flex: 2;">
                <input type="time" id="target-time" value="12:00" style="flex: 1;">
            </div>
            <label class="checkbox-container">
                <input type="checkbox" id="target-unknown" onchange="toggleTime('target')"> 對方不知道時辰
            </label>
            <button class="btn-primary" onclick="calculateMatch()">執行合盤推演</button>
        </div>

        <div id="match-result" style="display: none;">
            <div class="match-card">
                <div class="match-title">能量引力指數</div>
                <div class="match-score" id="match-score-value">0%</div>
                <div style="text-align: center; font-size: 0.85rem; color: #888;" id="match-summary">計算中...</div>
            </div>

            <div class="match-card">
                <div class="match-title">本命結構對比</div>
                <div class="bazi-compare-grid">
                    <div style="color: #4caf50;"><b>我</b><br><span id="compare-my-bazi"></span></div>
                    <div style="color: #2196f3;"><b>對方</b><br><span id="compare-target-bazi"></span></div>
                </div>
            </div>

            <div class="match-card">
                <div class="match-title">日主化學反應 (核心定位)</div>
                <div id="match-day-gan-desc" style="font-size: 0.9rem; line-height: 1.5;"></div>
            </div>

            <div class="match-card">
                <div class="match-title">地支潛在引力 (衝合判定)</div>
                <div id="match-branch-desc" style="font-size: 0.85rem; color: #ccc; line-height: 1.5;"></div>
            </div>
        </div>
    </div>
</div>

<div class="bottom-nav">
    <div class="nav-item active" onclick="switchPage('home', this)">
        <span class="nav-icon">🌌</span>
        <span>我的能量</span>
    </div>
    <div class="nav-item" onclick="switchPage('match', this)">
        <span class="nav-icon">💞</span>
        <span>合盤分析</span>
    </div>
</div>

<script>
// ==========================================
// 核心設定與資料庫
// ==========================================
const ELEMENT_MAP = { '甲': '木', '乙': '木', '丙': '火', '丁': '火', '戊': '土', '己': '土', '庚': '金', '辛': '金', '壬': '水', '癸': '水' };
const ZHI_ELEMENT_MAP = { '寅': '木', '卯': '木', '巳': '火', '午': '火', '申': '金', '酉': '金', '亥': '水', '子': '水', '辰': '土', '戌': '土', '丑': '土', '未': '土' };
const RELATION_MAP = {
    '木': { '木': '比劫', '火': '食傷', '土': '財星', '金': '官殺', '水': '印星' },
    '火': { '木': '印星', '火': '比劫', '土': '食傷', '金': '財星', '水': '官殺' },
    '土': { '木': '官殺', '火': '印星', '土': '比劫', '金': '食傷', '水': '財星' },
    '金': { '木': '財星', '火': '官殺', '土': '印星', '金': '比劫', '水': '食傷' },
    '水': { '木': '食傷', '火': '財星', '土': '官殺', '金': '印星', '水': '比劫' }
};

// ==========================================
// 頁面切換與 UI 邏輯
// ==========================================
function switchPage(pageId, navElement) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById('page-' + pageId).classList.add('active');
    
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    navElement.classList.add('active');
}

function toggleTime(prefix) {
    const timeInput = document.getElementById(`${prefix}-time`);
    const isUnknown = document.getElementById(`${prefix}-unknown`).checked;
    timeInput.disabled = isUnknown;
    timeInput.style.opacity = isUnknown ? '0.4' : '1';
}

// 輔助函式：根據輸入生成八字陣列 [stems, branches]
function getBaziArray(dateStr, timeStr, isUnknown) {
    if (!dateStr) return null;
    const [y, m, d] = dateStr.split('-');
    const hr = isUnknown ? 12 : parseInt(timeStr.split(':')[0]);
    const min = isUnknown ? 0 : parseInt(timeStr.split(':')[1]);
    
    const solar = Solar.fromYmdHms(parseInt(y), parseInt(m), parseInt(d), hr, min, 0);
    const lunar = Lunar.fromSolar(solar);
    const bazi = lunar.getEightChar();
    
    let stems = [bazi.getYearGan(), bazi.getMonthGan(), bazi.getDayGan()];
    let branches = [bazi.getYearZhi(), bazi.getMonthZhi(), bazi.getDayZhi()];
    
    if (!isUnknown) { stems.push(bazi.getTimeGan()); branches.push(bazi.getTimeZhi()); }
    return { stems, branches, formatStr: `${stems[0]}${branches[0]} ${stems[1]}${branches[1]} ${stems[2]}${branches[2]} ${isUnknown ? '？？' : stems[3]+branches[3]}` };
}

// ==========================================
// 首頁：個人流日功能
// ==========================================
function saveMyBazi() {
    const bDate = document.getElementById('my-date').value;
    const bTime = document.getElementById('my-time').value;
    const isUnknown = document.getElementById('my-unknown').checked;

    if (!bDate) return alert("請選擇生日日期！");
    
    localStorage.setItem('my_date', bDate);
    localStorage.setItem('my_time', bTime);
    localStorage.setItem('my_unknown', isUnknown);

    initHome();
    alert("本命已儲存！");
}

function initHome() {
    // 渲染今日日期
    const today = new Date();
    const solar = Solar.fromYmd(today.getFullYear(), today.getMonth() + 1, today.getDate());
    const lunar = Lunar.fromSolar(solar);
    const gzDay = lunar.getDayInGanZhi(); 
    
    document.getElementById('today-date').innerText = today.toLocaleDateString();
    document.getElementById('today-bazi').innerText = `(流日：${gzDay})`;

    // 載入我的八字
    const mDate = localStorage.getItem('my_date');
    if (!mDate) return; // 未設定不執行

    const mTime = localStorage.getItem('my_time') || '12:00';
    const mUnknown = localStorage.getItem('my_unknown') === 'true';
    
    document.getElementById('my-date').value = mDate;
    document.getElementById('my-time').value = mTime;
    document.getElementById('my-unknown').checked = mUnknown;
    toggleTime('my');

    const myBazi = getBaziArray(mDate, mTime, mUnknown);
    const userDayGan = myBazi.stems[2]; // 日主
    
    document.getElementById('my-bazi-display').style.display = 'block';
    document.getElementById('my-bazi-display').innerText = `我的命盤：${myBazi.formatStr} (日主${userDayGan})`;

    // 流日運算 (同前一版本的簡易 UI 渲染)
    renderTodayVibe(userDayGan, gzDay, lunar.getDayZhi());
}

function renderTodayVibe(userDayGan, gzDay, zhi) {
    const userElement = ELEMENT_MAP[userDayGan];
    const todayGanElement = ELEMENT_MAP[gzDay.substring(0, 1)];
    const relation = RELATION_MAP[userElement][todayGanElement];

    const themeMap = {
        '財星': { action: '噴寶', color: 'linear-gradient(135deg, #f1c40f, #f39c12)', text: '財氣透出！對金錢嗅覺靈敏。' },
        '官殺': { action: '突破', color: 'linear-gradient(135deg, #2c3e50, #1e3c72)', text: '壓力與名望並存，適合處理硬骨頭任務。' },
        '印星': { action: '吸收', color: 'linear-gradient(135deg, #d35400, #e67e22)', text: '貴人運佳，適合學習與補充內在能量。' },
        '食傷': { action: '輸出', color: 'linear-gradient(135deg, #16a085, #2980b9)', text: '才華橫溢，點子極多，適合創作。' },
        '比劫': { action: '自信', color: 'linear-gradient(135deg, #795548, #4e342e)', text: '能量充沛，適合交流合作。' }
    };

    const energy = themeMap[relation];
    document.getElementById('spectrum').style.background = energy.color;
    document.getElementById('spectrum').innerHTML = `<span style="font-size: 0.8rem; opacity: 0.7;">日主 ${userDayGan} | ${relation}</span><br><span style="font-size: 2.2rem;">${energy.action}</span>`;
    document.getElementById('description').innerHTML = `<b style="color: #fff;">今日核心感應</b><br>${energy.text}`;
}

// ==========================================
// 合盤頁：雙人關聯演算法
// ==========================================
function calculateMatch() {
    // 1. 取得我的資料
    const mDate = localStorage.getItem('my_date');
    if (!mDate) return alert("請先回到「我的能量」設定您的出生資訊！");
    const myBazi = getBaziArray(mDate, localStorage.getItem('my_time'), localStorage.getItem('my_unknown') === 'true');

    // 2. 取得對方資料
    const tDate = document.getElementById('target-date').value;
    const tTime = document.getElementById('target-time').value;
    const tUnknown = document.getElementById('target-unknown').checked;
    if (!tDate) return alert("請輸入對方的出生日期！");
    const targetBazi = getBaziArray(tDate, tTime, tUnknown);

    // 3. 顯示基本盤比對
    document.getElementById('match-result').style.display = 'block';
    document.getElementById('compare-my-bazi').innerText = myBazi.formatStr;
    document.getElementById('compare-target-bazi').innerText = targetBazi.formatStr;

    // --- 演算法開始 ---
    let score = 50; // 基礎分
    let dayGanLog = "";
    let branchLog = "";

    // A. 日主(日干)互動分析 (我在對方眼裡是什麼，對方在我眼裡是什麼)
    const myDayGan = myBazi.stems[2], tDayGan = targetBazi.stems[2];
    const myElement = ELEMENT_MAP[myDayGan], tElement = ELEMENT_MAP[tDayGan];
    
    // 天干五合檢查
    const hePairs = { '甲':'己', '己':'甲', '乙':'庚', '庚':'乙', '丙':'辛', '辛':'丙', '丁':'壬', '壬':'丁', '戊':'癸', '癸':'戊' };
    
    if (myDayGan === tDayGan) {
        score += 15; dayGanLog = `您們日主同為「${myDayGan}${myElement}」，屬於【比肩】關係。你們就像照鏡子，容易有靈魂共鳴，但有時也會因為太像而固執己見。`;
    } else if (hePairs[myDayGan] === tDayGan) {
        score += 30; dayGanLog = `🔥 強烈吸引！您們的日主「${myDayGan}」與「${tDayGan}」形成【天干五合】。這在命理上代表先天具有極強的化學反應與羈絆，是一眼萬年的絕佳組合！`;
    } else {
        const relationMeToTarget = RELATION_MAP[myElement][tElement];
        const relationTargetToMe = RELATION_MAP[tElement][myElement];
        
        if (relationMeToTarget === '財星') {
            score += 10; dayGanLog = `對方是您的【財星】。對方能帶來務實的啟發或資源，在您眼裡對方具有某種「可掌控」或值得付出的魅力。`;
        } else if (relationMeToTarget === '官殺') {
            score -= 5; dayGanLog = `對方是您的【官殺】。對方對您有一種無形的威嚴或吸引力，容易讓您產生敬畏感或壓力，是一段讓您成長的關係。`;
        } else if (relationMeToTarget === '印星') {
            score += 15; dayGanLog = `對方是您的【印星】。對方像長輩或避風港一樣能包容、支持您，跟對方在一起您會感到特別安心。`;
        } else if (relationMeToTarget === '食傷') {
            score += 10; dayGanLog = `對方是您的【食傷】。您會很願意照顧、寵愛對方，對方也能激發您的靈感與保護慾。`;
        }
    }

    // B. 地支衝合引力矩陣
    let heCount = 0; let chongCount = 0;
    const liuHe = {'子':'丑', '寅':'亥', '卯':'戌', '辰':'酉', '巳':'申', '午':'未'};
    const liuChong = {'子':'午', '丑':'未', '寅':'申', '卯':'酉', '辰':'戌', '巳':'亥'};

    myBazi.branches.forEach((mb, mIdx) => {
        targetBazi.branches.forEach((tb, tIdx) => {
            // 六合判定
            if (liuHe[mb] === tb || liuHe[tb] === mb) {
                heCount++; score += 5;
                let positionName = mIdx === 0 ? "年柱(觀念)" : mIdx === 1 ? "月柱(性格)" : mIdx === 2 ? "日柱(內心)" : "時柱(未來)";
                branchLog += `✅ 您的${positionName}「${mb}」與對方的「${tb}」相合，增加默契。<br>`;
            }
            // 六衝判定
            if (liuChong[mb] === tb || liuChong[tb] === mb) {
                chongCount++; score -= 5;
                let positionName = mIdx === 0 ? "年柱" : mIdx === 1 ? "月柱" : mIdx === 2 ? "日柱" : "時柱";
                branchLog += `⚠️ 您的${positionName}「${mb}」與對方的「${tb}」相衝，此領域易有摩擦。<br>`;
            }
        });
    });

    if (heCount === 0 && chongCount === 0) branchLog = "地支磁場平穩，無強烈的衝合糾葛，屬於細水長流型。";

    // 總結防呆與輸出
    score = Math.max(10, Math.min(99, score)); // 分數限縮在 10 ~ 99 之間
    document.getElementById('match-score-value').innerText = `${score}%`;
    document.getElementById('match-day-gan-desc').innerHTML = dayGanLog;
    document.getElementById('match-branch-desc').innerHTML = branchLog;

    let summaryText = score >= 80 ? "✨ 靈魂伴侶級別！強烈建議把握！" :
                      score >= 60 ? "😊 相處融洽，具備良好的發展基礎。" :
                      "🌱 挑戰與成長並存，需要更多溝通與包容。";
    document.getElementById('match-summary').innerText = summaryText;
}

// 初始化啟動
window.onload = initHome;
</script>

</body>
</html>
